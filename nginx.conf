server {
    listen 80;
    server_name _;

    # Tolerer les gros headers (cookies stale des anciennes sessions)
    large_client_header_buffers 4 32k;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: toutes les routes inconnues → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressif pour les assets hashés (JS/CSS/images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour index.html (toujours la dernière version)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
